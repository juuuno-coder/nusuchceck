version: '3.8'

services:
  app:
    container_name: nusucheck-app
    build: .
    image: nusucheck-app:latest
    ports:
      - "4080:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - storage_data:/rails/storage
    networks:
      - npm_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sidekiq:
    container_name: nusucheck-sidekiq
    build: .
    image: nusucheck-app:latest
    command: bundle exec sidekiq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - storage_data:/rails/storage
    networks:
      - npm_default
    restart: unless-stopped

  db:
    container_name: nusucheck-db
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nusucheck_production
      POSTGRES_USER: nusucheck
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - npm_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nusucheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: nusucheck-redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - npm_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  redis_data:
  storage_data:

networks:
  npm_default:
    external: true
