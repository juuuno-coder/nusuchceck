name: Deploy nusucheck to NCP Docker

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  IMAGE_NAME: nusucheck-app:latest
  CONTAINER: nusucheck-app
  PROJECT_PATH: /root/projects/nusucheck
  APP_PORT: 4080

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false
      - name: Install brakeman & bundler-audit
        run: gem install brakeman bundler-audit --no-document
      - name: Brakeman (static security analysis)
        # -w 2: High 이상 경고 시 실패, EOL 경고는 제외 (Ruby/Rails 버전 업그레이드는 별도 관리)
        run: brakeman --no-pager -q -w 2 --except EOLRuby,EOLRails
      - name: bundler-audit (gem CVE check)
        # CVE-2026-33658 (activestorage DoS): Rails 7.2+ 업그레이드 필요 — 별도 마일스톤으로 관리
        run: bundle-audit check --update --ignore CVE-2026-33658

  deploy:
    needs: security_scan
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .
          docker save ${{ env.IMAGE_NAME }} | gzip > /tmp/image.tar.gz

      - name: Transfer image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          source: "/tmp/image.tar.gz"
          target: "/tmp/"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}

            echo "=== git pull ==="
            git stash || true
            git pull origin main
            git stash pop || true

            echo "=== docker load ==="
            docker load < /tmp/image.tar.gz
            rm -f /tmp/image.tar.gz

            echo "=== docker compose up (app) ==="
            docker compose up -d --no-build --no-deps --wait app

            echo "=== db:migrate ==="
            docker exec ${{ env.CONTAINER }} bin/rails db:migrate || echo "⚠️ 마이그레이션 실패"

            echo "=== sidekiq 재시작 ==="
            docker compose up -d --no-build --no-deps sidekiq

            echo "=== health check ==="
            curl -sf http://localhost:${{ env.APP_PORT }}/up && echo "✅ 배포 완료" || (echo "❌ 헬스체크 실패" && docker logs ${{ env.CONTAINER }} --tail 30 && exit 1)
            docker exec npm-app-1 nginx -s reload || true

            echo "▶ 컨테이너 상태 확인..."
            docker compose ps

      - name: Cleanup old images
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          script: docker image prune -f
